<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preachers Study Module</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0b07;color:#e8dcc8;font-family:Georgia,serif;padding:20px}
h1{font-size:26px;color:#f0e6cc;font-style:italic;margin:6px 0 0}
.label{font-size:11px;letter-spacing:4px;color:#b08c3c;text-transform:uppercase}
.header{border-bottom:1px solid rgba(180,140,60,0.4);padding-bottom:16px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.search-row{display:flex;gap:10px;margin-bottom:12px}
#verse{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(180,140,60,0.4);color:#f0e6cc;padding:12px 16px;font-size:16px;font-family:Georgia,serif;font-style:italic;border-radius:4px;outline:none}
.btn-study{background:rgba(176,140,60,0.2);border:1px solid rgba(176,140,60,0.6);color:#c9a84c;padding:12px 24px;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-family:Georgia,serif;border-radius:4px;cursor:pointer}
.quick-verses{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.qv{background:transparent;border:1px solid rgba(176,140,60,0.25);color:rgba(200,170,100,0.5);padding:4px 12px;font-size:11px;cursor:pointer;border-radius:2px;font-family:Georgia,serif}
.tabs{display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid rgba(180,140,60,0.2);margin-bottom:20px}
.tab{padding:8px 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-family:Georgia,serif;cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;color:rgba(200,170,100,0.45)}
.tab.active{border-bottom:2px solid #b08c3c;background:rgba(176,140,60,0.15);color:#c9a84c}
#content{background:rgba(255,255,255,0.02);border:1px solid rgba(180,140,60,0.15);border-radius:4px;padding:28px 32px;min-height:200px;line-height:1.9;font-size:15px;color:#ddd0b8}
#content p{margin:4px 0}
#content p.hl{margin:16px 0 6px}
#content strong{color:#c9a84c}
.footer{position:fixed;bottom:0;left:0;right:0;border-top:1px solid rgba(180,140,60,0.15);background:rgba(13,11,7,0.98);padding:9px 28px;display:flex;justify-content:space-between;align-items:center}
.footer span{font-size:10px;color:rgba(176,140,60,0.35);letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div style="max-width:920px;margin:0 auto;padding-bottom:60px">
<div class="header">
<div>
<div class="label">The Preachers Lamp</div>
<h1>Scripture Study Module</h1>
</div>
<div style="font-size:20px;color:#b08c3c;opacity:0.5">* A a</div>
</div>
<div class="search-row">
<input id="verse" type="text" placeholder="Enter scripture e.g. John 3:16" />
<button class="btn-study" id="studyBtn">Study</button>
</div>
<div class="quick-verses">
<button class="qv" data-verse="John 3:16">John 3:16</button>
<button class="qv" data-verse="Genesis 1:1">Genesis 1:1</button>
<button class="qv" data-verse="Psalm 23">Psalm 23</button>
<button class="qv" data-verse="Isaiah 53:5">Isaiah 53:5</button>
<button class="qv" data-verse="Romans 8:28">Romans 8:28</button>
</div>
<div class="tabs">
<button class="tab active" data-tab="overview">Overview</button>
<button class="tab" data-tab="greek">Greek</button>
<button class="tab" data-tab="hebrew">Hebrew</button>
<button class="tab" data-tab="connections">Connections</button>
<button class="tab" data-tab="context">History</button>
<button class="tab" data-tab="culture">Culture</button>
<button class="tab" data-tab="questions">Questions</button>
<button class="tab" data-tab="sermon">Sermon</button>
</div>
<div id="content">
<div style="text-align:center;padding:40px 0;opacity:0.5">
<div style="font-size:36px;color:#b08c3c;margin-bottom:12px">*</div>
<p style="font-style:italic;color:#b08c3c">Thy word is a lamp unto my feet...</p>
<p style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(176,140,60,0.5);margin-top:4px">Psalm 119:105</p>
<p style="margin-top:20px;font-size:13px;color:rgba(200,170,100,0.4)">Enter any scripture above and click Study</p>
</div>
</div>
</div>
<div class="footer">
<span>Powered by Claude AI</span>
<span id="fv"></span>
<span id="fc">0/8 sections</span>
</div>
<script>
var KEY = "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;
var tab = "overview";
var verse = "";
var cache = {};
var prompts = {
overview: function(v){ return "You are a biblical scholar. Analyze this scripture: " + v + ". Provide: 1. **Scripture Text** - Full passage in ESV. 2. **Core Message** - Central truth in 2-3 sentences. 3. **Key Themes** - 3-5 major themes. 4. **Cross-References** - 4-6 related scriptures. 5. **Theological Significance**."; },
greek: function(v){ return "You are a NT Greek scholar. For this scripture: " + v + ". Provide: 1. **Original Language**. 2. **Key Words** - Greek characters, transliteration, Strongs number, meaning. 3. **Grammatical Notes**. 4. **Translation Nuances**. 5. **Application**."; },
hebrew: function(v){ return "You are a Hebrew scholar. For this scripture: " + v + ". Provide: 1. **Language** - Hebrew or Aramaic. 2. **Original Script** - Key phrases in Hebrew. 3. **Word Studies** - Hebrew characters, transliteration, Strongs, root meaning. 4. **Verb Stems**. 5. **Translation Gaps**."; },
connections: function(v){ return "You are a biblical theologian. For this scripture: " + v + ". Provide: 1. **Literary Context**. 2. **Book Connections** - 3-4 passages same book. 3. **OT and NT Bridge** - 4-5 cross-testament refs. 4. **Typological Links**. 5. **Thematic Thread** Genesis to Revelation. 6. **Gospel Connection**. 7. **Doctrinal Web**."; },
context: function(v){ return "You are a biblical historian. For this scripture: " + v + ". Provide: 1. **Date and Authorship**. 2. **Historical Background**. 3. **Political Climate**. 4. **Literary Context**. 5. **Original Audience**. 6. **Archaeological Evidence**. 7. **Geography**."; },
culture: function(v){ return "You are an Ancient Near Eastern expert. For this scripture: " + v + ". Provide: 1. **Cultural Setting**. 2. **Jewish Customs**. 3. **Social Structure**. 4. **Economic Context**. 5. **Geographic Setting**. 6. **Figurative Language**. 7. **Honor and Shame Culture**. 8. **Modern Misconceptions**."; },
questions: function(v){ return "You are a Bible teacher. For this scripture: " + v + ". Create: 1. **Observation Questions** - 4 questions. 2. **Interpretation Questions** - 4 questions. 3. **Application Questions** - 4 questions. 4. **Theological Deep Dives** - 3 questions. 5. **Small Group Discussion** - 4 questions. 6. **Preacher Reflection** - 3 questions."; },
sermon: function(v){ return "You are a homiletics professor. For this scripture: " + v + ". Provide: 1. **3 Sermon Outlines** - topical, expository, narrative. 2. **Illustrations** - 3 stories. 3. **Opening Hooks** - 3 options. 4. **Memorable Statements** - 5 one-liners. 5. **Application Points** - 4 modern applications. 6. **Pitfalls** to avoid. 7. **Call to Action** - 3 options."; }
};
function setContent(html){ document.getElementById("content").innerHTML = html; }
function render(text){
var lines = text.split("\n");
var html = "";
for(var i=0;i<lines.length;i++){
var l = lines[i];
if(!l.trim()){html+="<br>";continue;}
var isH = /^\d+\.\s\*\*/.test(l)||/^\*\*[^*]+\*\*/.test(l);
l = l.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
l = l.replace(/\*([^*]+)\*/g,"<em>$1</em>");
html += "<p class='"+(isH?"hl":"")+"'>"+l+"</p>";
}
setContent(html);
}
function load(v,s){
setContent("<p style='color:#b08c3c;font-style:italic;padding:20px 0'>Searching the ancient texts...</p>");
fetch("https://api.anthropic.com/v1/messages",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-api-key":KEY,
"anthropic-version":"2023-06-01",
"anthropic-dangerous-direct-browser-access":"true"
},
body:JSON.stringify({
model:"claude-sonnet-4-20250514",
max_tokens:1500,
messages:[{role:"user",content:prompts[s](v)}]
})
}).then(function(r){return r.json();}).then(function(d){
var t="";
if(d.content){for(var i=0;i<d.content.length;i++){if(d.content[i].text)t+=d.content[i].text;}}
if(!t)t="Unable to load. Check API key and billing at console.anthropic.com";
cache[s]=t;
render(t);
document.getElementById("fv").textContent="Studying: "+v;
document.getElementById("fc").textContent=Object.keys(cache).length+"/8 sections";
}).catch(function(e){
setContent("<p style='color:#f85149'>Error: "+e.message+"</p>");
});
}
function switchTab(s){
tab=s;
document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("active");});
document.querySelector("[data-tab='"+s+"']").classList.add("active");
if(verse){cache[s]?render(cache[s]):load(verse,s);}
}
function study(){
var v=document.getElementById("verse").value.trim();
if(!v)return;
verse=v;cache={};
load(v,tab);
}
document.getElementById("studyBtn").onclick = study;
document.getElementById("verse").onkeydown = function(e){if(e.key==="Enter")study();};
document.querySelectorAll(".qv").forEach(function(b){
b.onclick=function(){document.getElementById("verse").value=this.getAttribute("data-verse");};
});
document.querySelectorAll(".tab").forEach(function(b){
b.onclick=function(){switchTab(this.getAttribute("data-tab"));};
});
</script>
</body>
</html>
