<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Preacher's Study Module</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const STUDY_SECTIONS = [
      { id: "overview",    label: "Overview",              icon: "✦" },
      { id: "greek",       label: "Greek Study",           icon: "α" },
      { id: "hebrew",      label: "Hebrew & Aramaic",      icon: "א" },
      { id: "connections", label: "Scripture Connections", icon: "⛓" },
      { id: "context",     label: "Historical Context",    icon: "⊕" },
      { id: "culture",     label: "Culture & Setting",     icon: "◈" },
      { id: "questions",   label: "Study Questions",       icon: "?" },
      { id: "sermon",      label: "Sermon Seeds",          icon: "✿" },
    ];

    const PLACEHOLDER_VERSES = [
      "John 3:16","Romans 8:28","Philippians 4:13","Psalm 23:1",
      "Isaiah 40:31","Matthew 5:3","Ephesians 2:8-9","Genesis 1:1"
    ];

    const API_KEY = "PASTE_YOUR_API_KEY_HERE";

    function App() {
      const [scripture, setScripture] = React.useState("");
      const [activeSection, setActiveSection] = React.useState("overview");
      const [studyData, setStudyData] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [streamedText, setStreamedText] = React.useState("");
      const [isStreaming, setIsStreaming] = React.useState(false);
      const [placeholder, setPlaceholder] = React.useState(0);
      const contentRef = React.useRef(null);

      React.useEffect(() => {
        const interval = setInterval(() => {
          setPlaceholder(p => (p + 1) % PLACEHOLDER_VERSES.length);
        }, 2500);
        return () => clearInterval(interval);
      }, []);

      const buildPrompt = (verse, section) => {
        const prompts = {
          overview: `You are a world-class biblical scholar. Analyze "${verse}" and provide: 1. **Scripture Text** - Full passage (ESV/NASB) 2. **Core Message** - Central truth in 2-3 sentences 3. **Key Themes** - 3-5 major themes 4. **Cross-References** - 4-6 related scriptures 5. **Theological Significance** - Why this passage matters`,
          greek: `You are an expert NT Greek scholar. For "${verse}" provide: 1. **Original Language** - Greek or Hebrew? 2. **Key Words** - Greek word, Strong's number, literal meaning, usage elsewhere 3. **Grammatical Notes** - Verb tenses, cases 4. **Translation Nuances** - What English misses 5. **Application** - How Greek deepens understanding. Include Greek characters.`,
          hebrew: `You are a Hebrew/Aramaic scholar. For "${verse}" provide: 1. **Language** - Hebrew, Aramaic, or both? 2. **Original Script** - Key phrases in Hebrew/Aramaic 3. **Word Studies** - Hebrew word in script, transliteration, Strong's number, root meaning, semantic range 4. **Aramaic Sections** - Any Aramaic words? 5. **Grammatical Notes** - Verb stems (Qal, Niphal etc) 6. **Translation Gaps** - What English loses. Include Hebrew characters.`,
          connections: `You are a biblical theologian. For "${verse}" provide: 1. **Literary Context** - Verses before and after 2. **Book Connections** - 3-4 passages in same book 3. **OT/NT Bridge** - 4-5 cross-testament references with explanation 4. **Typological Links** - Types and shadows 5. **Thematic Thread** - Genesis to Revelation 6. **Gospel Connection** - How this points to Christ 7. **Doctrinal Web** - What doctrines this touches`,
          context: `You are a biblical historian. For "${verse}" provide: 1. **Date & Authorship** 2. **Historical Background** 3. **Political Climate** 4. **Literary Context** 5. **Original Audience** 6. **Archaeological Evidence** 7. **Geography** - Key locations`,
          culture: `You are an Ancient Near Eastern culture expert. For "${verse}" provide: 1. **Cultural Setting** 2. **Jewish Customs** 3. **Social Structure** 4. **Economic Context** 5. **Geographic Setting** 6. **Figurative Language** decoded 7. **Honor & Shame Culture** 8. **Modern Misconceptions**`,
          questions: `You are a Bible teacher. For "${verse}" create: 1. **Observation Questions** - 4 questions (What does it say?) 2. **Interpretation Questions** - 4 questions (What does it mean?) 3. **Application Questions** - 4 questions (How does it apply?) 4. **Theological Deep-Dives** - 3 doctrine questions 5. **Small Group Questions** - 4 discussion questions 6. **Preacher Reflection** - 3 personal questions`,
          sermon: `You are a homiletics professor. For "${verse}" provide: 1. **3 Sermon Outlines** - Topical, expository, narrative with main point and 3 sub-points each 2. **Illustrations** - 3 vivid stories 3. **Opening Hooks** - 3 attention-grabbers 4. **Memorable Statements** - 5 one-liners 5. **Application Points** - 4 modern applications 6. **Pitfalls** - What to avoid 7. **Call to Action** - 3 closing invitations`
        };
        return prompts[section];
      };

      const fetchSection = async (verse, section) => {
        setLoading(true);
        setIsStreaming(true);
        setStreamedText("");
        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": API_KEY,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              messages: [{ role: "user", content: buildPrompt(verse, section) }]
            })
          });
          const data = await response.json();
          const text = data.content?.map(b => b.text || "").join("") || "Unable to load.";
          let i = 0;
          const speed = Math.max(6, Math.floor(text.length / 280));
          const stream = setInterval(() => {
            if (i < text.length) {
              setStreamedText(text.slice(0, i + speed));
              i += speed;
              if (contentRef.current) contentRef.current.scrollTop = contentRef.current.scrollHeight;
            } else {
              setStreamedText(text);
              clearInterval(stream);
              setIsStreaming(false);
              setStudyData(prev => ({ ...prev, [section]: text }));
            }
          }, 16);
        } catch (err) {
          setStreamedText("Error: " + err.message);
          setIsStreaming(false);
        }
        setLoading(false);
      };

      const handleStudy = async () => {
        if (!scripture.trim()) return;
        setStudyData({});
        await fetchSection(scripture.trim(), activeSection);
      };

      const handleSectionChange = async (section) => {
        setActiveSection(section);
        if (!scripture.trim()) return;
        if (studyData && studyData[section]) {
          setStreamedText(studyData[section]);
          setIsStreaming(false);
        } else if (studyData) {
          await fetchSection(scripture.trim(), section);
        }
      };

      const formatContent = (text) => {
        if (!text) return null;
        return text.split("\n").map((line, i) => {
          if (line.trim() === "") return <br key={i} />;
          const html = line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>');
          const isHeader = line.match(/^\d+\.\s\*\*/) || line.match(/^\*\*[^*]+\*\*/);
          const hasRTL = /[\u0590-\u05FF]/.test(line);
          return <p key={i} style={{ margin: isHeader ? "16px 0 6px" : "5px 0", direction: hasRTL ? "rtl" : "ltr", fontSize: hasRTL ? "17px" : "15px", color: hasRTL ? "#e8c97a" : "#ddd0b8" }} dangerouslySetInnerHTML={{ __html: html }} />;
        });
      };

      return (
        <div style={{ minHeight:"100vh", background:"#0d0b07", fontFamily:"Georgia,serif", color:"#e8dcc8" }}>
          <div style={{ position:"fixed", inset:0, pointerEvents:"none", background:"radial-gradient(ellipse at 20% 20%, rgba(180,140,60,0.08) 0%, transparent 60%)" }} />
          <header style={{ position:"relative", zIndex:10, borderBottom:"1px solid rgba(180,140,60,0.3)", padding:"20px 28px", display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(13,11,7,0.95)" }}>
            <div>
              <div style={{ fontSize:"10px", letterSpacing:"4px", color:"#b08c3c", textTransform:"uppercase", marginBottom:"3px" }}>The Preacher's Lamp</div>
              <h1 style={{ fontSize:"24px", fontWeight:"700", margin:0, color:"#f0e6cc", fontStyle:"italic" }}>Scripture Study Module</h1>
            </div>
            <div style={{ fontSize:"20px", color:"#b08c3c", opacity:0.5 }}>✦ א α</div>
          </header>

          <div style={{ position:"relative", zIndex:10, padding:"24px 28px 0", maxWidth:"920px", margin:"0 auto" }}>
            <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(180,140,60,0.4)", borderRadius:"4px", padding:"16px 20px", display:"flex", gap:"12px", alignItems:"center" }}>
              <span style={{ color:"#b08c3c" }}>✦</span>
              <input value={scripture} onChange={e => setScripture(e.target.value)} onKeyDown={e => e.key==="Enter" && handleStudy()}
                placeholder={`e.g. ${PLACEHOLDER_VERSES[placeholder]}`}
                style={{ flex:1, background:"transparent", border:"none", outline:"none", color:"#f0e6cc", fontSize:"16px", fontFamily:"Georgia,serif", fontStyle:"italic" }} />
              <button onClick={handleStudy} disabled={loading||isStreaming}
                style={{ background:"rgba(176,140,60,0.18)", border:"1px solid rgba(176,140,60,0.6)", color:"#c9a84c", padding:"9px 20px", cursor:loading||isStreaming?"not-allowed":"pointer", fontSize:"11px", letterSpacing:"2px", textTransform:"uppercase", fontFamily:"Georgia,serif", borderRadius:"2px" }}>
                {loading ? "Studying..." : "Study"}
              </button>
            </div>
            <div style={{ display:"flex", gap:"7px", marginTop:"10px", flexWrap:"wrap" }}>
              {["John 3:16","Genesis 1:1","Psalm 23","Isaiah 53:5","Daniel 9:24","Matthew 5:1-12"].map(v => (
                <button key={v} onClick={() => setScripture(v)}
                  style={{ background:"transparent", border:"1px solid rgba(176,140,60,0.2)", color:"rgba(200,170,100,0.45)", padding:"3px 10px", fontSize:"10px", cursor:"pointer", fontFamily:"Georgia,serif", borderRadius:"2px" }}>
                  {v}
                </button>
              ))}
            </div>
          </div>

          <main style={{ position:"relative", zIndex:10, maxWidth:"920px", margin:"0 auto", padding:"24px 28px 80px" }}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"2px", borderBottom:"1px solid rgba(180,140,60,0.2)", marginBottom:"26px" }}>
              {STUDY_SECTIONS.map(s => (
                <button key={s.id} onClick={() => handleSectionChange(s.id)}
                  style={{ background:activeSection===s.id?"rgba(176,140,60,0.15)":"transparent", border:"none", borderBottom:activeSection===s.id?"2px solid #b08c3c":"2px solid transparent", color:activeSection===s.id?"#c9a84c":"rgba(200,170,100,0.45)", padding:"9px 12px", cursor:"pointer", fontSize:"10px", letterSpacing:"1.2px", textTransform:"uppercase", fontFamily:"Georgia,serif", whiteSpace:"nowrap" }}>
                  <span style={{ marginRight:"4px" }}>{s.icon}</span>{s.label}
                  {studyData?.[s.id] && s.id!==activeSection && <span style={{ marginLeft:"4px", color:"#b08c3c", fontSize:"7px" }}>●</span>}
                </button>
              ))}
            </div>

            {!studyData && !loading && (
              <div style={{ textAlign:"center", padding:"70px 20px", opacity:0.55 }}>
                <div style={{ fontSize:"40px", marginBottom:"16px", color:"#b08c3c" }}>✦</div>
                <p style={{ fontSize:"16px", fontStyle:"italic", color:"#b08c3c", marginBottom:"5px" }}>"Thy word is a lamp unto my feet..."</p>
                <p style={{ fontSize:"11px", letterSpacing:"2px", textTransform:"uppercase", color:"rgba(176,140,60,0.5)" }}>Psalm 119:105</p>
                <p style={{ marginTop:"26px", fontSize:"13px", color:"rgba(200,170,100,0.4)", lineHeight:"2" }}>Enter any scripture above to begin your deep study.</p>
              </div>
            )}

            {(streamedText || loading) && (
              <div ref={contentRef} style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(180,140,60,0.15)", borderRadius:"4px", padding:"28px 32px", maxHeight:"580px", overflowY:"auto", lineHeight:"1.95", fontSize:"15px", color:"#ddd0b8" }}>
                {loading && !streamedText && (
                  <div style={{ display:"flex", alignItems:"center", gap:"12px", color:"#b08c3c" }}>
                    <span>✦</span>
                    <span style={{ fontStyle:"italic", fontSize:"13px" }}>Searching the ancient texts...</span>
                  </div>
                )}
                {formatContent(streamedText)}
                {isStreaming && <span style={{ display:"inline-block", width:"2px", height:"14px", background:"#b08c3c", marginLeft:"2px", verticalAlign:"middle" }} />}
              </div>
            )}

            {studyData && !studyData[activeSection] && !loading && !streamedText && (
              <div style={{ textAlign:"center", padding:"55px 20px" }}>
                <div style={{ fontSize:"28px", color:"#b08c3c", marginBottom:"12px" }}>{STUDY_SECTIONS.find(s=>s.id===activeSection)?.icon}</div>
                <p style={{ fontStyle:"italic", color:"rgba(200,170,100,0.35)", fontSize:"13px" }}>Press Study to load {STUDY_SECTIONS.find(s=>s.id===activeSection)?.label.toLowerCase()}</p>
              </div>
            )}
          </main>

          <div style={{ position:"fixed", bottom:0, left:0, right:0, borderTop:"1px solid rgba(180,140,60,0.15)", background:"rgba(13,11,7,0.98)", padding:"9px 28px", display:"flex", alignItems:"center", justifyContent:"space-between", zIndex:20 }}>
            <span style={{ fontSize:"10px", color:"rgba(176,140,60,0.35)", letterSpacing:"2px", textTransform:"uppercase" }}>Powered by Claude AI</span>
            {scripture && studyData && <span style={{ fontSize:"11px", color:"rgba(176,140,60,0.45)", fontStyle:"italic" }}>Studying: {scripture}</span>}
            <span style={{ fontSize:"10px", color:"rgba(176,140,60,0.35)" }}>{Object.keys(studyData||{}).length}/{STUDY_SECTIONS.length} sections</span>
          </div>

          <style>{`
            * { box-sizing: border-box; }
            strong { color: #c9a84c; }
            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: #1a1610; }
            ::-webkit-scrollbar-thumb { background: #b08c3c; border-radius: 3px; }
            input::placeholder { color: rgba(176,140,60,0.28); }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
