<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API Test 2</title>
</head>
<body style="background:#0d0b07; color:#e8dcc8; font-family:Georgia,serif; padding:40px;">
<h2 style="color:#b08c3c;">API Test 2</h2>
<button id="btn" style="padding:12px 24px; cursor:pointer; margin-top:20px;">Test</button>
<pre id="out" style="margin-top:20px; color:#c9a84c; white-space:pre-wrap; word-break:break-all;"></pre>
<script>
document.getElementById("btn").onclick = async function() {
  document.getElementById("out").innerText = "Connecting...";
  try {
    var response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "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,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 20,
        messages: [{ role: "user", content: "Say hi." }]
      })
    });
    var text = await response.text();
    document.getElementById("out").innerText = "STATUS: " + response.status + "\n\n" + text;
  } catch(e) {
    document.getElementById("out").innerText = "CATCH ERROR: " + e.message + "\n" + e.stack;
  }
};
</script>
</body>
</html>
