<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API Test</title>
</head>
<body style="background:#0d0b07; color:#e8dcc8; font-family:Georgia,serif; padding:40px;">

<h2 style="color:#b08c3c; margin-bottom:20px;">API Key Test</h2>
<p style="margin-bottom:20px; color:rgba(200,170,100,0.6);">Click the button to test if your API key works.</p>

<button id="testBtn" style="background:rgba(176,140,60,0.2); border:1px solid rgba(176,140,60,0.6); color:#c9a84c; padding:12px 24px; font-size:14px; cursor:pointer; border-radius:4px;">
  Test API Key
</button>

<div id="result" style="margin-top:30px; padding:20px; border:1px solid rgba(180,140,60,0.2); border-radius:4px; min-height:60px; line-height:1.8;"></div>

<script>
var APIKEY = "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;

document.getElementById("testBtn").onclick = function() {
  document.getElementById("result").innerHTML = "<span style='color:#b08c3c'>Testing... please wait...</span>";

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "https://api.anthropic.com/v1/messages", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.setRequestHeader("x-api-key", APIKEY);
  xhr.setRequestHeader("anthropic-version", "2023-06-01");
  xhr.setRequestHeader("anthropic-dangerous-direct-browser-access", "true");

  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        document.getElementById("result").innerHTML = "<span style='color:#3fb950; font-size:18px;'>SUCCESS! Your API key works!</span><br><br>" + xhr.responseText.substring(0, 300);
      } else {
        document.getElementById("result").innerHTML = "<span style='color:#f85149; font-size:16px;'>FAILED - Status " + xhr.status + "</span><br><br>" + xhr.responseText;
      }
    }
  };

  xhr.onerror = function() {
    document.getElementById("result").innerHTML = "<span style='color:#f85149;'>Network error - cannot reach Anthropic servers</span>";
  };

  xhr.send(JSON.stringify({
    model: "claude-sonnet-4-20250514",
    max_tokens: 50,
    messages: [{ role: "user", content: "Say hello in 5 words." }]
  }));
};
</script>

</body>
</html>
