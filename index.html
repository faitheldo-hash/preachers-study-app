<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>
<body style="background:#0d0b07; color:#e8dcc8; font-family:Georgia,serif; padding:40px;">

<h2>Button Test</h2>
<p id="result" style="color:#b08c3c; margin:20px 0;">Click a button to test...</p>

<button id="btn1" style="padding:10px 20px; margin:10px; cursor:pointer;">Button 1</button>
<button id="btn2" style="padding:10px 20px; margin:10px; cursor:pointer;">Button 2</button>
<button id="btn3" style="padding:10px 20px; margin:10px; cursor:pointer;">Button 3</button>

<script>
document.getElementById("btn1").onclick = function() {
  document.getElementById("result").innerText = "Button 1 works!";
};
document.getElementById("btn2").onclick = function() {
  document.getElementById("result").innerText = "Button 2 works!";
};
document.getElementById("btn3").onclick = function() {
  document.getElementById("result").innerText = "Button 3 works!";
};
</script>

</body>
</html>
