html<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API Test</title>
</head>
<body style="background:#0d0b07; color:#e8dcc8; font-family:Georgia,serif; padding:40px;">
<h2 style="color:#b08c3c;">API Connection Test</h2>
<button id="btn" style="padding:12px 24px; cursor:pointer; margin-top:20px;">Test Connection</button>
<p id="out" style="margin-top:20px; color:#c9a84c;"></p>
<script>
document.getElementById("btn").onclick = function() {
  document.getElementById("out").innerText = "Connecting...";
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "https://api.anthropic.com/v1/messages", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.setRequestHeader("x-api-key", "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);
  xhr.setRequestHeader("anthropic-version", "2023-06-01");
  xhr.setRequestHeader("anthropic-dangerous-direct-browser-access", "true");
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      document.getElementById("out").innerText = "Status: " + xhr.status + " --- " + xhr.responseText;
    }
  };
  xhr.onerror = function() {
    document.getElementById("out").innerText = "Network error";
  };
  xhr.send(JSON.stringify({
    model: "claude-sonnet-4-20250514",
    max_tokens: 20,
    messages: [{ role: "user", content: "Say hi." }]
  }));
};
</script>
</body>
</html>
